# NapCat 看门狗配置

QQ_BIN="/opt/QQ/qq"
QQ_NUM="1091619707"
WEBUI_PORT="6099"
NAPCAT_LOG="/tmp/napcat_run.log"
WATCHDOG_LOG="/var/log/napcat-watchdog.log"
LOCK_FILE="/tmp/napcat-watchdog.lock"
STATE_FILE="/tmp/napcat-watchdog.state"

# 1=启动时使用 -q 快速登录；失败后用 napcat.env 中的密码自动回退
QUICK_LOGIN="1"
AUTO_LOGIN="1"
NAPCAT_ENV="${SCRIPT_DIR}/napcat.env"

# 检测到离线后，仅做 ServerTime 同步超过此分钟数则重启
OFFLINE_GRACE_MIN="15"
# 被腾讯踢下线（KickedOffLine/登录失效）后等待此分钟数即重启
KICK_GRACE_MIN="3"

# 两次重启之间的最短间隔（秒）
COOLDOWN_SEC="300"

# 启动后等待 WebUI 就绪的最长时间（秒）
STARTUP_WAIT_SEC="30"
